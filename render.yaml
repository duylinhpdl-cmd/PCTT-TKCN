services:
  - type: web
    name: storm-monitor-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webhook_server:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # Điền tay trong Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false          # Đặt chuỗi bất kỳ, ví dụ: storm_abc123
      - key: RENDER_URL
        sync: false          # URL của app sau khi deploy, ví dụ: https://storm-bot-xxxx.onrender.com
    healthCheckPath: /ping
