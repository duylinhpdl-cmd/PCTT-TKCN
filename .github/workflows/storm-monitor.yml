name: 🌀 Storm Monitor — Báo cáo tự động

on:
  schedule:
    # Giờ VN (UTC+7) → UTC
    - cron: "0 1 * * *"    # 08:00 VN
    - cron: "0 7 * * *"    # 14:00 VN
    - cron: "0 13 * * *"   # 20:00 VN
    - cron: "0 19 * * *"   # 02:00 VN (sáng sớm)
  workflow_dispatch:         # ← Cho phép bấm "Run workflow" thủ công để test

permissions:
  contents: write

concurrency:
  group: repo-git-push
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Cài thư viện
        run: pip install requests beautifulsoup4 lxml

      - name: 🔍 Kiểm tra secrets
        run: |
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "❌ THIẾU secret: TELEGRAM_BOT_TOKEN"
            echo "   → Vào Settings > Secrets > Actions > New repository secret"
            exit 1
          fi
          if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "❌ THIẾU secret: TELEGRAM_CHAT_ID"
            echo "   → Vào Settings > Secrets > Actions > New repository secret"
            exit 1
          fi
          echo "✅ Secrets đã cấu hình đầy đủ"
          echo "   Token: $(echo '${{ secrets.TELEGRAM_BOT_TOKEN }}' | cut -c1-8)..."
          echo "   Chat ID: ${{ secrets.TELEGRAM_CHAT_ID }}"

      - name: 🌀 Chạy báo cáo thời tiết
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python monitor.py
          echo "✅ Chạy xong lúc $(TZ='Asia/Ho_Chi_Minh' date '+%d/%m/%Y %H:%M (GMT+7)')"

      - name: 💾 Lưu trạng thái (có retry)
        run: |
          git config user.name  "storm-bot[bot]"
          git config user.email "storm-bot@noreply.github.com"
          git add state.json
          git diff --cached --quiet && echo "Không có thay đổi" && exit 0
          git commit -m "chore: update state [skip ci]"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push; then
              echo "✅ Push thành công ở lần thử $i"
              exit 0
            fi
            echo "⚠️ Push thất bại lần $i, thử lại..."
            sleep $((RANDOM % 5 + 2))
          done
          echo "❌ Push thất bại sau 5 lần thử"
        continue-on-error: true   # Không dừng nếu không có gì để commit
