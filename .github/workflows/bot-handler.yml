"""
🤖 bot_handler.py — Nhận và trả lời lệnh Telegram
Dùng scraper NHANH (chỉ đọc RSS/tiêu đề, không đọc nội dung bài)
để tránh timeout GitHub Actions 10 phút
"""

import os, json, time, re, requests
from datetime import datetime, timezone, timedelta
from xml.etree import ElementTree as ET
from bs4 import BeautifulSoup

# ── Cấu hình ──────────────────────────────────────────────────────────────────
TOKEN    = os.environ.get("TELEGRAM_BOT_TOKEN", "")
CHAT_IDS = os.environ.get("TELEGRAM_CHAT_ID", "")
STATE_F  = "bot_state.json"
API      = f"https://api.telegram.org/bot{TOKEN}"

ALLOWED  = {s.strip() for s in CHAT_IDS.split(",") if s.strip()}

VN_TZ    = timezone(timedelta(hours=7))
HEADERS  = {"User-Agent": "Mozilla/5.0 StormBot/1.0"}

VN_KW = [
    "áp thấp nhiệt đới","áp thấp","bão số","cơn bão",
    "bão nhiệt đới","bão mạnh","vùng áp thấp","nhiễu động",
    "biển đông","đổ bộ","cảnh báo bão","tin bão",
]

INTENSITY = [
    ("SUPER TYPHOON","Siêu bão",5),("SEVERE TYPHOON","Bão rất mạnh",4),
    ("TYPHOON","Bão",3),("TROPICAL STORM","Bão nhiệt đới",2),
    ("TROPICAL DEPRESSION","Áp thấp nhiệt đới",1),
    ("DISTURBANCE","Nhiễu động nhiệt đới",0),("LOW","Vùng áp thấp",0),
]

# ── Tiện ích ──────────────────────────────────────────────────────────────────
def now_vn(): return datetime.now(VN_TZ)
def fmt_vn(): return now_vn().strftime("%d/%m/%Y %H:%M (GMT+7)")
def has_kw(t): return any(k in t.lower() for k in VN_KW)

def load_state():
    if os.path.exists(STATE_F):
        with open(STATE_F, encoding="utf-8") as f: return json.load(f)
    return {"offset": 0}

def save_state(s):
    with open(STATE_F, "w", encoding="utf-8") as f:
        json.dump(s, f, ensure_ascii=False, indent=2)

def dich_cuong_do(text):
    t = text.upper()
    for en, vi, cap in INTENSITY:
        if en in t: return vi, cap
    if "siêu bão" in text.lower(): return "Siêu bão", 5
    if "bão số" in text.lower() or "cơn bão" in text.lower(): return "Bão", 3
    if "áp thấp nhiệt đới" in text.lower(): return "Áp thấp nhiệt đới", 1
    if "áp thấp" in text.lower(): return "Vùng áp thấp", 0
    return "Chưa xác định", -1

# ── Telegram API ───────────────────────────────────────────────────────────────
def tg(method, **p):
    try:
        r = requests.post(f"{API}/{method}", json=p, timeout=15)
        return r.json()
    except Exception as e:
        print(f"[TG/{method}] {e}")
        return {}

def send(chat_id, text, kb=None):
    p = {"chat_id": chat_id, "text": text,
         "parse_mode": "HTML", "disable_web_page_preview": True}
    if kb: p["reply_markup"] = kb
    return tg("sendMessage", **p)

def typing(chat_id): tg("sendChatAction", chat_id=chat_id, action="typing")

def get_updates(offset):
    res = tg("getUpdates", offset=offset, timeout=8, limit=10)
    return res.get("result", [])

def co_quyen(chat_id):
    if not ALLOWED: return True
    return str(chat_id) in ALLOWED

# ── Scraper NHANH (chỉ RSS/tiêu đề, không đọc nội dung bài) ─────────────────
def fetch_rss(url, timeout=8):
    try:
        r = requests.get(url, headers=HEADERS, timeout=timeout)
        return ET.fromstring(r.content).findall(".//item")
    except: return []

def scrape_nhanh_tat_ca():
    """Thu thập tin từ tất cả nguồn — CHỈ đọc RSS/tiêu đề, không đọc bài."""
    results = []

    # 1. NCHMF
    try:
        from bs4 import BeautifulSoup
        r = requests.get(
            "https://nchmf.gov.vn/Kttvsite/vi-VN/1/tin-bao-khan-cap-post.html",
            headers=HEADERS, timeout=8)
        soup = BeautifulSoup(r.text, "html.parser")
        for a in soup.select("a")[:20]:
            t = a.get_text(strip=True)
            if len(t) > 10 and has_kw(t):
                h = a.get("href","")
                url = h if h.startswith("http") else "https://nchmf.gov.vn" + h
                cap, cap_so = dich_cuong_do(t)
                results.append({"src":"NCHMF","title":t,"url":url,"cap":cap,"cap_so":cap_so})
    except Exception as e: print(f"[NCHMF] {e}")

    # 2. VnExpress RSS
    for item in fetch_rss("https://vnexpress.net/rss/thoi-tiet.rss"):
        t = (item.findtext("title") or "").strip()
        u = (item.findtext("link") or "").strip()
        if has_kw(t):
            cap, cap_so = dich_cuong_do(t)
            results.append({"src":"VnExpress","title":t,"url":u,"cap":cap,"cap_so":cap_so})

    # 3. Tuổi Trẻ RSS
    for item in fetch_rss("https://tuoitre.vn/rss/thoi-su.rss"):
        t = (item.findtext("title") or "").strip()
        u = (item.findtext("link") or "").strip()
        if has_kw(t):
            cap, cap_so = dich_cuong_do(t)
            results.append({"src":"Tuổi Trẻ","title":t,"url":u,"cap":cap,"cap_so":cap_so})

    # 4. Dân Trí RSS
    for item in fetch_rss("https://dantri.com.vn/xa-hoi.rss"):
        t = (item.findtext("title") or "").strip()
        u = (item.findtext("link") or "").strip()
        if has_kw(t):
            cap, cap_so = dich_cuong_do(t)
            results.append({"src":"Dân Trí","title":t,"url":u,"cap":cap,"cap_so":cap_so})

    # 5. Thanh Niên RSS
    for item in fetch_rss("https://thanhnien.vn/rss/thoi-su.rss"):
        t = (item.findtext("title") or "").strip()
        u = (item.findtext("link") or "").strip()
        if has_kw(t):
            cap, cap_so = dich_cuong_do(t)
            results.append({"src":"Thanh Niên","title":t,"url":u,"cap":cap,"cap_so":cap_so})

    # 6. JMA JSON
    try:
        r = requests.get(
            "https://www.jma.go.jp/bosai/typhoon/data/tropicalCyclone.json",
            headers=HEADERS, timeout=8)
        data = r.json()
        storms = data.get("TropicalCyclone", [])
        if isinstance(storms, dict): storms = [storms]
        for s in storms:
            name = s.get("name",{}).get("en","?")
            inten = s.get("intensity",{}).get("description",{}).get("en","")
            cap, cap_so = dich_cuong_do(inten)
            pos = s.get("currentPosition",{})
            lat = pos.get("latitude","?")
            lon = pos.get("longitude","?")
            results.append({
                "src":"JMA","cap":cap,"cap_so":cap_so,
                "title":f"{cap} {name} tại {lat}°N {lon}°E",
                "url":"https://www.jma.go.jp/en/typh/",
            })
    except Exception as e: print(f"[JMA] {e}")

    # 7. JTWC RSS
    for item in fetch_rss("https://www.metoc.navy.mil/jtwc/rss/jtwc.rss"):
        t = (item.findtext("title") or "").strip()
        u = (item.findtext("link") or "").strip()
        d = (item.findtext("description") or "")
        if not any(k in (t+d).upper() for k in ["WP","WESTERN PACIFIC"]): continue
        if not any(k in (t+d).upper() for k in ["DEPRESSION","STORM","TYPHOON"]): continue
        cap, cap_so = dich_cuong_do(t + d)
        results.append({"src":"JTWC","title":t,"url":u,"cap":cap,"cap_so":cap_so})

    # Lọc trùng theo tiêu đề
    seen, unique = set(), []
    for x in results:
        k = x["title"][:50]
        if k not in seen:
            seen.add(k); unique.append(x)

    return unique

def phan_loai(items):
    bao   = [x for x in items if x["cap_so"] >= 3]
    at    = [x for x in items if x["cap_so"] in (1,2)]
    nhieu = [x for x in items if x["cap_so"] == 0]
    return bao, at, nhieu

def dong_tin(x):
    url = x.get("url","")
    tieu = x["title"][:90] + ("..." if len(x["title"])>90 else "")
    src  = x.get("src","")
    if url:
        return f"  [{src}] <a href='{url}'>{tieu}</a>\n"
    return f"  [{src}] {tieu}\n"

# ── Bàn phím ──────────────────────────────────────────────────────────────────
def kb_chinh():
    return {"keyboard":[
        [{"text":"🔍 Kiểm tra ngay"},{"text":"📊 Tóm tắt tình hình"}],
        [{"text":"🌀 Chỉ xem bão/áp thấp"},{"text":"📰 Tin báo VN"}],
        [{"text":"🛰 Nguồn quốc tế"},{"text":"ℹ️ Hướng dẫn"}],
    ],"resize_keyboard":True}

# ── Xử lý lệnh ───────────────────────────────────────────────────────────────
def cmd_start(cid, ten="bạn"):
    send(cid,
        f"👋 Xin chào <b>{ten}</b>!\n\n"
        "🤖 Tôi là <b>Bot Cảnh báo Thời tiết Việt Nam</b>\n"
        "Theo dõi bão, áp thấp từ Thái Bình Dương có khả năng vào Biển Đông.\n\n"
        "<b>Các lệnh:</b>\n"
        "🔍 <b>Kiểm tra ngay</b> — quét tất cả nguồn\n"
        "📊 <b>Tóm tắt tình hình</b> — báo cáo tổng hợp\n"
        "🌀 <b>Chỉ xem bão/áp thấp</b> — lọc tin nghiêm trọng\n"
        "📰 <b>Tin báo VN</b> — báo trong nước\n"
        "🛰 <b>Nguồn quốc tế</b> — JTWC, JMA, NOAA\n\n"
        "⏰ Bot tự báo cáo lúc 02h · 08h · 14h · 20h (GMT+7)\n"
        f"🕐 {fmt_vn()}",
        kb_chinh())

def cmd_kiem_tra(cid):
    typing(cid)
    send(cid, "⏳ Đang quét tất cả 7 nguồn, vui lòng chờ...")
    typing(cid)

    items = scrape_nhanh_tat_ca()
    bao, at, nhieu = phan_loai(items)

    if not items:
        send(cid,
            "✅ <b>Không có hiện tượng thời tiết bất thường</b>\n\n"
            "Đã kiểm tra 7 nguồn trong nước và quốc tế.\n"
            "Biển Đông và Tây Thái Bình Dương hiện ổn định.\n\n"
            f"🕐 {fmt_vn()}", kb_chinh())
        return

    if bao and any("biển đông" in x["title"].lower() or
                   any(k in x["title"].lower() for k in ["đổ bộ","việt nam"]) for x in bao):
        muc = "🔴 <b>RẤT NGUY HIỂM — BÃO Ở BIỂN ĐÔNG</b>"
    elif bao:   muc = "🟠 <b>NGUY HIỂM — CÓ BÃO ĐANG HOẠT ĐỘNG</b>"
    elif at:    muc = "🟡 <b>CẦN THEO DÕI — CÓ ÁP THẤP NHIỆT ĐỚI</b>"
    else:       muc = "🟢 <b>THEO DÕI — CÓ NHIỄU ĐỘNG TRÊN BIỂN</b>"

    msg = (f"🔍 <b>KẾT QUẢ KIỂM TRA</b>\n"
           f"🕐 {fmt_vn()}\n"
           f"{'━'*22}\n\n"
           f"{muc}\n\n")

    if bao:
        msg += f"🌀 <b>Bão ({len(bao)} hệ thống):</b>\n"
        for x in bao[:3]: msg += dong_tin(x)
        msg += "\n"
    if at:
        msg += f"⚠️ <b>Áp thấp nhiệt đới ({len(at)} hệ thống):</b>\n"
        for x in at[:3]: msg += dong_tin(x)
        msg += "\n"
    if nhieu:
        msg += f"🔵 <b>Nhiễu động / Vùng áp thấp ({len(nhieu)} khu vực):</b>\n"
        for x in nhieu[:2]: msg += dong_tin(x)

    send(cid, msg, kb_chinh())

def cmd_tom_tat(cid):
    typing(cid)
    send(cid, "⏳ Đang tổng hợp...")
    items = scrape_nhanh_tat_ca()
    bao, at, nhieu = phan_loai(items)

    if not bao and not at and not nhieu:
        dg = "🟢 <b>BÌNH THƯỜNG</b>"
    elif bao:   dg = "🟠 <b>NGUY HIỂM — CÓ BÃO</b>"
    elif at:    dg = "🟡 <b>CẦN THEO DÕI</b>"
    else:       dg = "🟡 <b>THEO DÕI</b>"

    msg = (f"📊 <b>TÓM TẮT TÌNH HÌNH</b>\n"
           f"🕐 {fmt_vn()}\n"
           f"{'━'*22}\n\n"
           f"{dg}\n\n"
           f"🌀 Bão: <b>{len(bao)}</b> hệ thống\n"
           f"⚠️ Áp thấp nhiệt đới: <b>{len(at)}</b> hệ thống\n"
           f"🔵 Nhiễu động: <b>{len(nhieu)}</b> khu vực\n\n")

    if bao:
        msg += "🌀 <b>Bão đang theo dõi:</b>\n"
        for x in bao[:2]: msg += dong_tin(x)
    elif at:
        msg += "⚠️ <b>Áp thấp đang theo dõi:</b>\n"
        for x in at[:2]: msg += dong_tin(x)
    else:
        msg += "✅ Không ghi nhận sự kiện nghiêm trọng.\n"

    msg += f"\n{'━'*22}\n📡 Nguồn: NCHMF · VnExpress · Tuổi Trẻ · Dân Trí · Thanh Niên · JTWC · JMA"
    send(cid, msg, kb_chinh())

def cmd_bao_ap_thap(cid):
    typing(cid)
    items = scrape_nhanh_tat_ca()
    bao, at, _ = phan_loai(items)
    nghiem = bao + at

    if not nghiem:
        send(cid,
            "✅ <b>Không có bão hoặc áp thấp nhiệt đới</b>\n\n"
            "Không tìm thấy hệ thống nào đang hoạt động\n"
            "trong khu vực Thái Bình Dương và Biển Đông.\n\n"
            f"🕐 {fmt_vn()}", kb_chinh())
        return

    msg = f"🌀 <b>BÃO / ÁP THẤP ĐANG HOẠT ĐỘNG ({len(nghiem)} hệ thống)</b>\n"
    msg += f"🕐 {fmt_vn()}\n{'━'*22}\n\n"
    for x in nghiem[:5]:
        cap = x.get("cap","?")
        msg += f"{'🌀' if x['cap_so']>=3 else '⚠️'} <b>{cap}</b>\n"
        msg += dong_tin(x) + "\n"

    send(cid, msg, kb_chinh())

def cmd_tin_vn(cid):
    typing(cid)
    nguon_vn = {"NCHMF","VnExpress","Tuổi Trẻ","Dân Trí","Thanh Niên"}
    items = [x for x in scrape_nhanh_tat_ca() if x["src"] in nguon_vn]

    if not items:
        send(cid,
            "ℹ️ <b>Báo trong nước chưa có tin thời tiết bất thường</b>\n\n"
            f"🕐 {fmt_vn()}", kb_chinh())
        return

    msg = f"📰 <b>TIN BÁO TRONG NƯỚC ({len(items)} bài)</b>\n"
    msg += f"🕐 {fmt_vn()}\n{'━'*22}\n\n"
    for x in items[:6]: msg += dong_tin(x) + "\n"
    send(cid, msg, kb_chinh())

def cmd_tin_qt(cid):
    typing(cid)
    nguon_qt = {"JMA","JTWC","NHC"}
    items = [x for x in scrape_nhanh_tat_ca() if x["src"] in nguon_qt]

    if not items:
