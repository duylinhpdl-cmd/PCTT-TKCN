name: Bot Handler

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot-handler:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4 lxml

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POLLING_MINUTES: "4"
        run: python bot_handler.py

      - name: Save state
        if: always()
        run: |
          git config user.name "storm-bot[bot]"
          git config user.email "storm-bot@noreply.github.com"
          git add bot_state.json || true
          git diff --cached --quiet && echo "Không có thay đổi" && exit 0
          git commit -m "update bot state [skip ci]"
          # Retry push tối đa 3 lần nếu bị reject do conflict
          for i in 1 2 3; do
            git pull --rebase origin main && git push && echo "✅ Push OK" && exit 0
            echo "⚠️ Lần $i thất bại, thử lại..."
            sleep $((i * 3))
          done
          echo "❌ Push thất bại sau 3 lần — bỏ qua, không ảnh hưởng bot"
          exit 0
        continue-on-error: true
