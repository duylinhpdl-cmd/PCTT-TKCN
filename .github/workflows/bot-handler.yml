name: 🤖 Telegram Bot Handler

on:
  schedule:
    # Chạy mỗi 10 phút để nhận và trả lời tin nhắn từ Telegram
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot-handler:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 🤖 Run bot handler (polling 8 phút)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_handler.py

      - name: 💾 Save bot state (offset)
        run: |
          git config user.name  "storm-bot[bot]"
          git config user.email "storm-bot@noreply.github.com"
          git add bot_state.json || true
          git diff --cached --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
