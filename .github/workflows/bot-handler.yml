# ── Phân loại lệnh ───────────────────────────────────────────────────────────
def xu_ly(upd):
    msg  = upd.get("message") or upd.get("channel_post") or {}
    if not msg: return
    cid  = msg.get("chat",{}).get("id")
    text = (msg.get("text") or "").strip()
    ten  = msg.get("from",{}).get("first_name","bạn")
    if not cid or not text: return

    if not co_quyen(cid):
        send(cid, "⛔ Bạn không có quyền dùng bot này.")
        return

    print(f"[Bot] {cid}: {text[:40]}")

    cmd_map = {
        "/start":                   cmd_start,
        "/help":                    cmd_start,
        "🔍 Kiểm tra ngay":          cmd_kiem_tra,
        "/check":                   cmd_kiem_tra,
        "📊 Tóm tắt tình hình":     cmd_tom_tat,
        "/summary":                 cmd_tom_tat,
        "🌀 Chỉ xem bão/áp thấp":   cmd_bao_ap_thap,
        "/bao":                     cmd_bao_ap_thap,
        "📰 Tin báo VN":            cmd_tin_vn,
        "/vn":                      cmd_tin_vn,
        "🛰 Nguồn quốc tế":         cmd_tin_qt,
        "/qt":                      cmd_tin_qt,
        "ℹ️ Hướng dẫn":             cmd_huong_dan,
        "/huongdan":                cmd_huong_dan,
    }

    fn = cmd_map.get(text)
    if fn:
        if fn in (cmd_start,):
            fn(cid, ten)
        else:
            fn(cid)
    else:
        send(cid,
            f"❓ Không hiểu lệnh: <b>{text[:30]}</b>\n"
            "Nhấn nút bên dưới hoặc gõ /help",
            kb_chinh())

# ── Main: polling 8 phút ─────────────────────────────────────────────────────
def main():
    if not TOKEN:
        print("❌ Chưa cấu hình TELEGRAM_BOT_TOKEN"); return

    state  = load_state()
    offset = state.get("offset", 0)
    print(f"[Bot Handler] Bắt đầu lúc {fmt_vn()}, offset={offset}")

    deadline  = time.time() + 8 * 60   # Chạy 8 phút
    processed = 0

    while time.time() < deadline:
        try:
            updates = get_updates(offset)
        except Exception as e:
            print(f"[Polling] Lỗi: {e}")
            time.sleep(5)
            continue

        for upd in updates:
            try:
                xu_ly(upd)
            except Exception as e:
                print(f"[xu_ly] Lỗi: {e}")
            offset = upd["update_id"] + 1
            processed += 1

        # Lưu offset sau mỗi lần xử lý
        state["offset"]   = offset
        state["last_run"] = fmt_vn()
        save_state(state)

        if not updates:
            time.sleep(3)

    print(f"[Bot Handler] Xong. Đã xử lý {processed} cập nhật. Offset={offset}")

if __name__ == "__main__":
    main()

