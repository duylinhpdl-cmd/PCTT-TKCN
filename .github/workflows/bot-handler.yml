name: Bot Handler

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot-handler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4 lxml

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_handler.py

      - name: Save state
        run: |
          git config user.name "storm-bot[bot]"
          git config user.email "storm-bot@noreply.github.com"
          git add bot_state.json || true
          git diff --cached --quiet && echo "Không có thay đổi" && exit 0
          git pull --rebase origin main
          git commit -m "update bot state [skip ci]"
          git push
        continue-on-error: true
