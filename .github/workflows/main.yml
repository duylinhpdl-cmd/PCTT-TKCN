name: 🌀 Storm Monitor Bot

on:
  schedule:
    # Giờ VN (UTC+7) → UTC:
    # 08:00 VN = 01:00 UTC
    # 14:00 VN = 07:00 UTC
    # 20:00 VN = 13:00 UTC
    # 02:00 VN = 19:00 UTC
    - cron: "0 1 * * *"
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 🌀 Run storm monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: 💾 Save state
        run: |
          git config user.name  "storm-bot[bot]"
          git config user.email "storm-bot@noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
